<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jayvee — Debt Tracker</title>
<script src="/static/chart.min.js"></script>
<style>
:root {
  --bg:      #0f172a;
  --surface: #1e293b;
  --hover:   #273344;
  --border:  #334155;
  --border2: #475569;
  --text:    #e2e8f0;
  --text2:   #cbd5e1;
  --muted:   #94a3b8;
  --faint:   #64748b;
  --inp:     #0f172a;
  --chart-grid: #334155;
  --chart-tick: #64748b;
}
[data-theme="light"] {
  --bg:      #f1f5f9;
  --surface: #ffffff;
  --hover:   #f8fafc;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --text:    #0f172a;
  --text2:   #1e293b;
  --muted:   #64748b;
  --faint:   #94a3b8;
  --inp:     #f8fafc;
  --chart-grid: #e2e8f0;
  --chart-tick: #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
nav{background:var(--surface);padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:.85rem;transition:.15s;white-space:nowrap}
nav a:hover,nav a.active{background:var(--border);color:var(--text)}
nav .brand{font-weight:700;color:var(--text);font-size:1rem;white-space:nowrap}
.nav-spacer{flex:1}
.nav-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.nav-toggle:hover{background:var(--border)}
.nav-links{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:.85rem;transition:.15s;margin-left:4px}
.theme-btn:hover{background:var(--border)}

.page{padding:24px 20px;max-width:1100px;margin:0 auto}
h2{font-size:1.3rem;font-weight:700;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border)}
.card .label{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.card .value{font-size:1.35rem;font-weight:700}
.red{color:#ef4444}.green{color:#22c55e}.yellow{color:#eab308}.blue{color:#3b82f6}
.section{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid var(--border)}
.section h3{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.charts{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border)}
.chart-card h3{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:9px 12px;font-size:.85rem;border-bottom:1px solid var(--bg)}
tr:hover td{background:var(--hover)}
.badge{padding:2px 8px;border-radius:999px;font-size:.72rem;font-weight:600}
.badge-green{background:#166534;color:#86efac}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-yellow{background:#713f12;color:#fde68a}
.attack{background:#854d0e;color:#fde68a;padding:3px 10px;border-radius:999px;font-weight:700;font-size:.75rem}
form .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px}
input,select{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem}
input:focus,select:focus{outline:none;border-color:#3b82f6}
input:disabled{color:var(--muted)}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-back{background:var(--border);color:var(--text);text-decoration:none;padding:10px 20px;border-radius:8px;font-size:.9rem;font-weight:600;display:inline-block;border:none;cursor:pointer}
.btn-back:hover{background:var(--border2)}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem}
.alert-success{background:#166534;color:#86efac}
.alert-error{background:#7f1d1d;color:#fca5a5}
.card-section{background:var(--surface);border-radius:12px;padding:18px;margin-bottom:12px;border-left:3px solid var(--border)}
.card-section h4{font-size:.9rem;font-weight:600;margin-bottom:14px;color:var(--text2)}
.tab-btn{background:transparent;color:var(--muted);border:none;padding:8px 18px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s}
.tab-btn:hover{background:var(--border);color:var(--text)}
.tab-active{background:#3b82f6!important;color:#fff!important}
.qbtn{padding:1px 7px;border-radius:999px;border:none;font-size:.7rem;font-weight:600;cursor:pointer;margin-left:4px;vertical-align:middle;background:var(--border);color:var(--muted)}
.qbtn:hover{background:var(--border2);color:var(--text)}
.qbtn-green{background:#166534;color:#86efac}.qbtn-green:hover{background:#15803d;color:#fff}
.qbtn-blue{background:#1d4ed8;color:#bfdbfe}.qbtn-blue:hover{background:#2563eb;color:#fff}
.qbtn-red{background:#7f1d1d;color:#fca5a5}.qbtn-red:hover{background:#991b1b;color:#fff}
.chart-toggle{display:flex;gap:4px;margin-bottom:12px}
.chart-toggle button{padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s}
.chart-toggle button:hover{background:var(--border);color:var(--text)}
.chart-toggle button.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* ── Mobile responsive tables ── */
@media(max-width:640px){
  .table-card thead{display:none}
  .table-card tr{display:block;background:var(--surface);border-radius:10px;margin-bottom:10px;padding:12px 14px;border:1px solid var(--border)}
  .table-card tr:hover{background:var(--hover)}
  .table-card tbody tr:last-child{margin-bottom:0}
  .table-card td{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border:none;font-size:.85rem;gap:8px;min-height:28px}
  .table-card td:empty{display:none}
  .table-card td::before{content:attr(data-label);color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600;flex-shrink:0;min-width:80px}
  .table-card td[colspan]{flex-direction:column;align-items:flex-start}
  .table-card td[colspan]::before{margin-bottom:2px}
}

/* ── Mobile nav ── */
@media(max-width:640px){
  .nav-toggle{display:block}
  .nav-links{display:none;flex-direction:column;align-items:flex-start;width:100%;padding-top:8px;border-top:1px solid var(--border);margin-top:8px}
  .nav-links.open{display:flex}
  .nav-links a,.nav-links .theme-btn{width:100%;text-align:left}
  .nav-spacer{display:none}
  .charts{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
  .page{padding:16px 14px}
  form .row{grid-template-columns:1fr}
}
@media(max-width:360px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <span class="brand">💳 Debt Tracker</span>
  <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="/" class="{{ 'active' if active=='dashboard' else '' }}">Dashboard</a>
    <a href="/add" class="{{ 'active' if active=='add' else '' }}">Add Month</a>
    <a href="/debts" class="{{ 'active' if active=='debts' else '' }}">My Cards</a>
    <a href="/remit" class="{{ 'active' if active=='remit' else '' }}">Remittance</a>
    <a href="/plan" class="{{ 'active' if active=='plan' else '' }}">Payoff Plan</a>
    <a href="/settings" class="{{ 'active' if active=='settings' else '' }}">Settings</a>
    <span class="nav-spacer"></span>
    {% if request.session.get('is_admin') %}<a href="/admin" class="{{ 'active' if active=='admin' else '' }}" style="color:#eab308">Admin</a>{% endif %}
    <a href="/logout" style="color:#f87171">Logout</a>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
</nav>
<div class="page">
{% block content %}{% endblock %}
</div>
<script>
window.CURRENCY_SYMBOL = "{{ currency_symbol(request) }}";
function toggleNav() {
  document.getElementById('nav-links').classList.toggle('open');
}
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', html.dataset.theme);
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
  });
})();
</script>
</body>
</html>
