# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personal-debt-tracker'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  PORT = '5050'

[[mounts]]
  source = 'debt_tracker_data'
  destination = '/data'

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/healthz'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
